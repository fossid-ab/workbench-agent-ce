# .github/workflows/api-tests.yml
name: API Tests

# Run when API package or API test tree changes.
on:
  push:
    paths:
      - 'src/workbench_agent/api/**'
      - 'tests/api/**'
      - 'pyproject.toml'
    paths-ignore:
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/workbench_agent/api/**'
      - 'tests/api/**'
      - 'pyproject.toml'
    paths-ignore:
      - '.github/workflows/**'

# Live contract tests use the same repository secrets as functional tests:
# - WORKBENCH_URL
# - WORKBENCH_USER
# - WORKBENCH_TOKEN
# Live tests skip automatically when secrets are not configured.

jobs:
  api_unit_tests:
    name: API Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pytest pytest-xdist pytest-mock
      - name: Run API unit and contract-fixture tests
        run: |
          pytest tests/api/ -m "not requires_workbench" -v --tb=short

  api_live_tests:
    name: API Live Contract Tests
    runs-on: ubuntu-latest
    needs: [api_unit_tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run API live contract tests
        env:
          WORKBENCH_URL: ${{ secrets.WORKBENCH_URL }}
          WORKBENCH_USER: ${{ secrets.WORKBENCH_USER }}
          WORKBENCH_TOKEN: ${{ secrets.WORKBENCH_TOKEN }}
        run: |
          pytest tests/api/ -m requires_workbench -v --tb=short --junit-xml=api-live-test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-live-test-results
          path: api-live-test-results.xml
          if-no-files-found: ignore
