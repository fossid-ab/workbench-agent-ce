# Publishes ghcr.io/fossid-ab/workbench-agent-ce stable tags from the checked-out ref.
# Run via workflow_dispatch from main after bumping version in pyproject.toml.
name: Publish Stable Release to GHCR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v prefix (must match pyproject.toml), e.g. 0.8.0"
        required: true
        type: string

concurrency:
  group: ghcr-release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches pyproject.toml
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          got=$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [ "$got" != "$EXPECTED_VERSION" ]; then
            echo "pyproject.toml version is '$got', expected '$EXPECTED_VERSION'"
            exit 1
          fi
          if ! [[ "$EXPECTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Releases require semver X.Y.Z (got '$EXPECTED_VERSION')"
            exit 1
          fi

      - name: Ensure GitHub release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "GitHub release v${VERSION} already exists"
            exit 1
          fi

      - name: Docker tags
        id: dockertags
        env:
          VERSION: ${{ inputs.version }}
        run: |
          IMAGE=ghcr.io/fossid-ab/workbench-agent-ce
          {
            echo 'tags<<EOF'
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:latest"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.dockertags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=workbench-agent-ce
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release and git tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" \
            --target "$GITHUB_SHA" \
            --title "v${VERSION}" \
            --generate-notes
