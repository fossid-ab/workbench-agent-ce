name: Publish Stable Release to GHCR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v prefix (must match pyproject.toml), e.g. 0.8.0"
        required: true
        type: string
      prerelease:
        description: "If true, publish only the version tag (no latest, no major.minor alias)"
        required: false
        type: boolean
        default: false
      release_notes:
        description: "Release notes (markdown). Leave empty to auto-generate from commits."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches pyproject.toml
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          got=$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [ "$got" != "$EXPECTED_VERSION" ]; then
            echo "pyproject.toml version is '$got', expected '$EXPECTED_VERSION'"
            exit 1
          fi

      - name: GHCR image name (lowercase)
        id: ghcr
        run: echo "image=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker tags
        id: dockertags
        env:
          IMAGE: ${{ steps.ghcr.outputs.image }}
          VERSION: ${{ inputs.version }}
          # Stringify boolean so bash always sees literal true/false
          PRERELEASE: ${{ inputs.prerelease && 'true' || 'false' }}
        run: |
          {
            echo 'tags<<EOF'
            echo "${IMAGE}:${VERSION}"
            if [ "$PRERELEASE" != "true" ]; then
              echo "${IMAGE}:latest"
              if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "${IMAGE}:${VERSION%.*}"
              fi
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.dockertags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=workbench-agent-ce
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Create GitHub Release and git tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease && 'true' || 'false' }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          if [ -n "${RELEASE_NOTES// }" ]; then
            printf '%s\n' "$RELEASE_NOTES" > "$NOTES_FILE"
            NOTES_ARG=(--notes-file "$NOTES_FILE")
          else
            NOTES_ARG=(--generate-notes)
          fi
          PRE_ARG=()
          if [ "$PRERELEASE" = "true" ]; then
            PRE_ARG=(--prerelease)
          fi
          gh release create "v${VERSION}" \
            --target "$GITHUB_SHA" \
            --title "v${VERSION}" \
            "${NOTES_ARG[@]}" \
            "${PRE_ARG[@]}"
