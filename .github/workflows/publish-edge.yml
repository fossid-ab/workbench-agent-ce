# Publishes ghcr.io/fossid-ab/workbench-agent-ce:edge from the checked-out ref.
# Run via workflow_dispatch from the main branch so :edge matches main and
# dogfood workflows (dogfood-*.yml) pull the expected image.
name: Publish Edge Image to GHCR

on: workflow_dispatch

concurrency:
  group: ghcr-edge
  cancel-in-progress: true

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/fossid-ab/workbench-agent-ce:edge
          labels: |
            org.opencontainers.image.title=workbench-agent-ce
            org.opencontainers.image.revision=${{ github.sha }}
